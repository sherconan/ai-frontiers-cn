<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#grad)" opacity="0.12"/>
  <circle cx="60" cy="60" r="56" stroke="url(#grad)" stroke-width="2.5" fill="none"/>
  <!-- Brain/neural network nodes -->
  <circle cx="60" cy="35" r="6" fill="url(#grad)"/>
  <circle cx="38" cy="52" r="5" fill="url(#grad)"/>
  <circle cx="82" cy="52" r="5" fill="url(#grad)"/>
  <circle cx="45" cy="72" r="5.5" fill="url(#grad2)"/>
  <circle cx="75" cy="72" r="5.5" fill="url(#grad2)"/>
  <circle cx="60" cy="85" r="4.5" fill="url(#grad2)"/>
  <!-- Connections -->
  <line x1="60" y1="35" x2="38" y2="52" stroke="url(#grad)" stroke-width="1.8" opacity="0.6"/>
  <line x1="60" y1="35" x2="82" y2="52" stroke="url(#grad)" stroke-width="1.8" opacity="0.6"/>
  <line x1="38" y1="52" x2="45" y2="72" stroke="url(#grad2)" stroke-width="1.8" opacity="0.5"/>
  <line x1="82" y1="52" x2="75" y2="72" stroke="url(#grad2)" stroke-width="1.8" opacity="0.5"/>
  <line x1="38" y1="52" x2="75" y2="72" stroke="url(#grad)" stroke-width="1.2" opacity="0.3"/>
  <line x1="82" y1="52" x2="45" y2="72" stroke="url(#grad)" stroke-width="1.2" opacity="0.3"/>
  <line x1="45" y1="72" x2="60" y2="85" stroke="url(#grad2)" stroke-width="1.8" opacity="0.5"/>
  <line x1="75" y1="72" x2="60" y2="85" stroke="url(#grad2)" stroke-width="1.8" opacity="0.5"/>
  <line x1="45" y1="72" x2="75" y2="72" stroke="url(#grad2)" stroke-width="1.5" opacity="0.4"/>
  <line x1="38" y1="52" x2="82" y2="52" stroke="url(#grad)" stroke-width="1.5" opacity="0.4"/>
  <!-- Center pulse -->
  <circle cx="60" cy="58" r="8" fill="url(#grad)" opacity="0.15"/>
  <circle cx="60" cy="58" r="4" fill="url(#grad)"/>
  <!-- Outer decorative arcs -->
  <path d="M 25 60 A 35 35 0 0 1 60 25" stroke="url(#grad)" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4 3"/>
  <path d="M 95 60 A 35 35 0 0 1 60 95" stroke="url(#grad2)" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4 3"/>
</svg>
